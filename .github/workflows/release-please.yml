name: Release Please

# Maintains a rolling "release PR" from Conventional Commits on main. Merging that PR
# bumps the version (package.json + .claude-plugin/plugin.json + .claude-plugin/marketplace.json
# via release-please-config.json extra-files), updates CHANGELOG.md, tags, and publishes a
# GitHub Release. This repo publishes nothing downstream — the release is the deliverable.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # An org-level PAT (RELEASE_BOT_PAT) lets the release PR trigger CI; falls back to the
          # built-in GITHUB_TOKEN (PRs it opens won't re-trigger workflows, which is fine).
          token: ${{ secrets.RELEASE_BOT_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
