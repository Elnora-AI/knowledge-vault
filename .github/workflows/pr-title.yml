# Lints the PR title as a Conventional Commit. Uses pull_request_target so it
# works on fork PRs, but it only reads the PR title (a sanitized string) and
# never checks out or executes PR code — safe as written. Do NOT add
# actions/checkout of the PR head here.

name: PR Title Lint

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            ci
            refactor
            perf
            test
            revert
            build
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must not be empty after the type prefix."
